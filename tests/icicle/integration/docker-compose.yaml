services:
  kafka:
    image: apache/kafka:3.8.1
    container_name: icicle-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      CLUSTER_ID: 'ci_PQ_sN7Qii-b-Ab9rA'
      KAFKA_LISTENERS: 'DOCKER://:29092,OUTSIDE://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'DOCKER://kafka:29092,OUTSIDE://localhost:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'DOCKER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,DOCKER:PLAINTEXT,OUTSIDE:PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
